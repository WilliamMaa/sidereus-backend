edition: 3.0.0
name: sidereus-backend
access: default

vars:
  region: cn-beijing
  # ACR 个人版 · 命名空间 mingyu_dev
  image: crpi-kbillu37fwb6ufae.cn-beijing.personal.cr.aliyuncs.com/mingyu_dev/sidereus-backend:v1

resources:
  sidereus-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: sidereus-resume-api
      description: AI 智能简历分析 API
      runtime: custom-container
      timeout: 120
      memorySize: 512
      cpu: 0.5
      diskSize: 512
      instanceConcurrency: 10
      customContainerConfig:
        image: ${vars.image}
        port: 9000
      environmentVariables:
        DASHSCOPE_API_KEY: ${env(DASHSCOPE_API_KEY)}
        QWEN_MODEL: qwen-plus
        CACHE_ENABLED: ${env(CACHE_ENABLED)}
        CORS_ORIGINS: ${env(CORS_ORIGINS)}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
